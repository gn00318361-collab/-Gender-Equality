<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性別平等小學堂 — 1~6 年級通用版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft JhengHei","PingFang TC",sans-serif;background:linear-gradient(135deg,#FFF7ED 0%,#FEF0E4 100%);min-height:100vh}
.game-container{max-width:800px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{display:none;width:100%;animation:fadeIn .5s ease}
.screen.active{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}25%{transform:scale(1.3)}}
@keyframes confettiPop{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-80px) scale(0.5) rotate(360deg)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
@keyframes timerLow{0%,100%{color:#E63946}50%{color:#FF6B6B}}
@keyframes dropIn{from{opacity:0;transform:translateY(-20px) scale(0.8)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Title */
.title-screen{text-align:center;padding:40px 20px;background:linear-gradient(135deg,#FF9A56 0%,#FF6B8A 50%,#A855F7 100%);border-radius:30px;color:white;box-shadow:0 10px 40px rgba(255,107,138,.3)}
.title-screen h1{font-size:2.5em;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,.2)}
.title-screen .subtitle{font-size:1.2em;margin-bottom:8px;opacity:.9}
.title-screen .grade{font-size:1em;margin-bottom:30px;opacity:.8}
.title-screen .mascot{font-size:5em;margin:20px 0}

.btn{display:inline-block;padding:15px 40px;border-radius:50px;border:none;font-size:1.2em;font-family:inherit;cursor:pointer;transition:all .3s;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,.15)}
.btn:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.btn-start{background:white;color:#FF6B8A}
.btn-next{background:linear-gradient(135deg,#FF9A56,#FF6B8A);color:white;margin-top:20px}

/* HUD */
.game-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding:15px 20px;background:white;border-radius:20px;box-shadow:0 4px 12px rgba(0,0,0,.08);font-weight:bold;flex-wrap:wrap;gap:10px}
.lives-display{display:flex;gap:6px;font-size:1.4em}
.heart{display:inline-block;transition:all .3s}
.heart.lost{opacity:.2;transform:scale(.8)}
.heart.shake{animation:shake .4s ease}
.score-combo-display{display:flex;gap:15px;align-items:center}
.combo-display{display:none;align-items:center;gap:4px;font-size:1.1em;color:#FF6B8A;animation:pulse .4s ease}
.combo-display.active{display:flex}

/* Timer */
.timer-container{position:relative;width:70px;height:70px;margin:10px auto}
.timer-circle{width:100%;height:100%;border-radius:50%;background:conic-gradient(#FF6B8A var(--percentage),#FFE0E6 0);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.4em;color:#FF6B8A;box-shadow:inset 0 0 0 3px white;transition:color .2s}
.timer-circle.warning{animation:timerLow .5s ease infinite}

/* Progress */
.progress-bar{width:100%;height:12px;background:#FFE0E6;border-radius:10px;margin:12px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#FF9A56,#FF6B8A,#A855F7);border-radius:10px;transition:width .5s ease}
.progress-text{text-align:center;color:#FF6B8A;font-size:.9em;font-weight:bold}

/* Game Card */
.game-card{background:white;border-radius:24px;padding:30px;box-shadow:0 8px 30px rgba(0,0,0,.08);width:100%;position:relative;overflow:hidden;transition:all .3s}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#FF9A56,#FF6B8A,#A855F7)}
.game-card.shake-anim{animation:shake .5s ease}

.level-badge{display:inline-block;background:linear-gradient(135deg,#FF9A56,#FF6B8A);color:white;padding:5px 16px;border-radius:20px;font-size:.85em;font-weight:bold;margin-bottom:15px}
.question-text{font-size:1.25em;color:#333;margin-bottom:10px;line-height:1.6}
.scenario-emoji{font-size:3.5em;text-align:center;margin:10px 0}
.scenario-box{background:#FFF7ED;border-radius:16px;padding:18px;margin:12px 0;border-left:4px solid #FF9A56;font-size:1.05em;line-height:1.7;color:#444}

/* Choice */
.options{display:flex;flex-direction:column;gap:12px;margin-top:15px}
.option-btn{padding:16px 20px;border-radius:16px;border:3px solid #FFE0E6;background:#FFFAFA;font-size:1.05em;font-family:inherit;cursor:pointer;transition:all .3s;text-align:left;color:#444}
.option-btn:hover{border-color:#FF6B8A;background:#FFF0F3;transform:scale(1.02)}
.option-btn.correct{border-color:#4CAF50;background:#E8F5E9;color:#2E7D32}
.option-btn.wrong{border-color:#F44336;background:#FFEBEE;color:#C62828}
.option-btn.disabled{pointer-events:none;opacity:.7}

/* O/X Buttons */
.ox-statement{background:#FFF7ED;border-radius:16px;padding:20px;margin:15px 0;border-left:4px solid #A855F7;font-size:1.15em;line-height:1.7;color:#333;text-align:center}
.ox-buttons{display:flex;gap:20px;justify-content:center;margin-top:20px}
.ox-btn{width:120px;height:120px;border-radius:50%;border:4px solid;font-size:3em;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;font-weight:bold;font-family:inherit}
.ox-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.ox-btn.o-btn{border-color:#4CAF50;background:#E8F5E9;color:#4CAF50}
.ox-btn.o-btn:hover{background:#C8E6C9}
.ox-btn.x-btn{border-color:#F44336;background:#FFEBEE;color:#F44336}
.ox-btn.x-btn:hover{background:#FFCDD2}
.ox-btn.selected{transform:scale(1.15);box-shadow:0 8px 25px rgba(0,0,0,.2)}
.ox-btn.correct-answer{border-color:#4CAF50;background:#4CAF50;color:white;transform:scale(1.15)}
.ox-btn.wrong-answer{border-color:#F44336;background:#F44336;color:white;transform:scale(0.9);opacity:.5}
.ox-btn.disabled{pointer-events:none;opacity:.6}

.ox-sub-question{font-size:.95em;color:#888;margin-top:8px;text-align:center}
.ox-progress-dots{display:flex;gap:8px;justify-content:center;margin-bottom:15px}
.ox-dot{width:12px;height:12px;border-radius:50%;background:#FFE0E6;transition:all .3s}
.ox-dot.done-correct{background:#4CAF50}
.ox-dot.done-wrong{background:#F44336}
.ox-dot.current{background:#FF6B8A;transform:scale(1.3)}

/* Feedback */
.feedback{margin-top:18px;padding:16px 20px;border-radius:16px;font-size:1em;line-height:1.6;animation:fadeIn .3s ease}
.feedback.correct{background:#E8F5E9;color:#2E7D32;border-left:4px solid #4CAF50}
.feedback.wrong{background:#FFF3E0;color:#E65100;border-left:4px solid #FFB347}

/* Effects */
.floating-score{position:fixed;font-weight:bold;font-size:1.3em;pointer-events:none;animation:floatUp 1s ease-out forwards;z-index:100}
.floating-score.correct{color:#4CAF50}
.floating-score.wrong{color:#E63946}
.confetti-particle{position:fixed;pointer-events:none;font-size:1.5em;animation:confettiPop .8s ease-out forwards;z-index:100}

/* Result */
.result-screen{text-align:center;padding:40px 20px}
.result-card{background:white;border-radius:24px;padding:40px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.result-emoji{font-size:5em;margin-bottom:15px}
.result-title{font-size:2em;background:linear-gradient(135deg,#FF9A56,#FF6B8A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.result-score{font-size:1.3em;color:#666;margin-bottom:5px}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0;text-align:left}
.result-stat{background:#FFF7ED;padding:12px;border-radius:12px;border-left:4px solid #FF6B8A}
.result-stat-label{font-size:.85em;color:#888}
.result-stat-value{font-size:1.2em;font-weight:bold;color:#FF6B8A}
.result-msg{font-size:1.1em;color:#888;margin:15px 0 25px 0;line-height:1.6;white-space:pre-line}
.stars{font-size:2.5em;margin:15px 0}

/* Game Over */
.gameover-card{background:white;border-radius:24px;padding:40px;box-shadow:0 8px 30px rgba(0,0,0,.08);text-align:center}
.gameover-emoji{font-size:4em;margin-bottom:15px}
.gameover-title{font-size:2em;color:#E63946;margin-bottom:15px}
.gameover-msg{font-size:1.1em;color:#666;margin-bottom:30px}

@media(max-width:600px){
  .title-screen h1{font-size:1.8em}
  .game-card{padding:20px}
  .question-text{font-size:1.1em}
  .ox-btn{width:90px;height:90px;font-size:2.2em}
  .ox-buttons{gap:15px}
  .game-hud{flex-direction:column;align-items:flex-start}
  .score-combo-display{width:100%;justify-content:space-between}
  .result-stats{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="game-container" id="app">

  <div class="screen active" id="titleScreen">
    <div class="title-screen">
      <div class="mascot">🌈</div>
      <h1>性別平等小學堂</h1>
      <div class="subtitle">⭕❌ 圈叉大挑戰</div>
      <div class="grade">1～6 年級通用</div>
      <button class="btn btn-start" onclick="startGame()">開始挑戰！🚀</button>
    </div>
  </div>

  <div class="screen" id="gameScreen">
    <div class="game-hud">
      <div class="lives-display" id="livesDisplay"></div>
      <div class="score-combo-display">
        <div>⭐ <span id="scoreDisplay">0</span> 分</div>
        <div class="combo-display" id="comboDisplay">🔥x<span id="comboValue">0</span></div>
      </div>
    </div>
    <div class="timer-container" id="timerContainer" style="display:none">
      <div class="timer-circle" id="timerCircle" style="--percentage:100%">20</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">第 1 關 / 共 5 關</div>
    <div class="game-card" id="gameCard"></div>
  </div>

  <div class="screen" id="gameoverScreen">
    <div class="gameover-card">
      <div class="gameover-emoji">💔</div>
      <div class="gameover-title">遊戲結束</div>
      <div class="gameover-msg">沒關係，再試一次吧！<br>每次都會學到新東西！</div>
      <div style="font-size:1.2em;color:#FF6B8A;font-weight:bold;margin-bottom:20px">最終分數：<span id="gameoverScore">0</span> 分</div>
      <button class="btn btn-start" onclick="startGame()">重新開始 🎮</button>
    </div>
  </div>

  <div class="screen" id="resultScreen">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="stars" id="resultStars"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-stats" id="resultStats"></div>
      <div class="result-msg" id="resultMsg"></div>
      <button class="btn btn-start" onclick="startGame()">再玩一次 🌟</button>
    </div>
  </div>
</div>

<script>
var levels = [
  {
    type: "ox",
    badge: "🚫 刻板印象破解",
    question: "以下這些說法，是對的 ⭕ 還是錯的 ❌？",
    items: [
      { statement: "「男生不可以哭」", answer: false, explain: "每個人都有流淚的權利，哭不是丟臉的事！" },
      { statement: "「女生數學比較差」", answer: false, explain: "數學能力跟性別無關，努力學習最重要！" },
      { statement: "「護士只有女生能當」", answer: false, explain: "很多男生也是優秀的護理師喔！" },
      { statement: "「每個人都可以自由選擇自己喜歡的顏色」", answer: true, explain: "沒有所謂『男生色』或『女生色』，喜歡什麼顏色都很棒！" }
    ],
    correctMsg: "太棒了！這些刻板印象都不是真的。每個人都可以自由選擇自己的興趣和喜好！",
    wrongMsg: "記住：男生可以哭、女生數學也很強、男生也能當護理師——不要被刻板印象限制了！"
  },
  {
    type: "choice",
    badge: "🏫 校園情境",
    emoji: "🤔",
    scenario: "下課時間，小明對小美說：「你是女生，所以不能跟我們一起打籃球！」",
    question: "你覺得最好的回應是什麼？",
    options: [
      { text: "🌈 「打籃球不分男女，大家一起玩更好玩！」", correct: true },
      { text: "😞 「算了，女生本來就不適合打球。」", correct: false },
      { text: "😡 「那你也不准玩跳繩！」", correct: false }
    ],
    correctMsg: "答對了！運動不分性別，每個人都有權利參加自己喜歡的活動。一起玩更開心！",
    wrongMsg: "最好的方式是告訴大家：運動不分男女！每個人都可以參加自己喜歡的運動喔。"
  },
  {
    type: "ox",
    badge: "🛡️ 求助管道",
    question: "遇到困難時，以下做法對不對？",
    items: [
      { statement: "被大人打或虐待，要打 113 保護專線求救", answer: true, explain: "113 是全國保護專線，24 小時都有人接聽！" },
      { statement: "在學校被同學霸凌，應該忍耐不說", answer: false, explain: "被霸凌一定要告訴導師或輔導室，忍耐只會讓情況更糟！" },
      { statement: "網路上被陌生人騷擾，要截圖並告訴爸媽", answer: true, explain: "截圖保留證據，馬上告訴爸媽或老師！" },
      { statement: "被欺負是因為自己不夠強，要怪自己", answer: false, explain: "被欺負絕對不是你的錯！要勇敢求助！" }
    ],
    correctMsg: "你好棒！記住：被虐待打 113、校園霸凌找老師、網路騷擾截圖告訴家人！",
    wrongMsg: "正確做法：被虐待→113、霸凌→不能忍耐要告訴老師、網路騷擾→截圖告訴爸媽！"
  },
  {
    type: "choice",
    badge: "💬 日常對話",
    emoji: "🗣️",
    scenario: "小華的爸爸每天負責煮晚餐和接小孩放學。有同學笑小華說：「你爸爸怎麼像媽媽一樣！」",
    question: "你覺得小華可以怎麼回答？",
    options: [
      { text: "😊 「我爸爸煮的菜超好吃的！照顧家人不分爸爸媽媽。」", correct: true },
      { text: "😣 覺得很丟臉，不想說話", correct: false },
      { text: "😤 「你才奇怪！」", correct: false }
    ],
    correctMsg: "說得好！照顧家庭不分爸爸媽媽，煮飯、打掃、接送小孩，每個家人都可以做。這是很棒的事！",
    wrongMsg: "照顧家人不是只有媽媽才能做的事喔！爸爸煮飯、接小孩都是很正常、很棒的事！"
  },
  {
    type: "ox",
    badge: "🌟 誰說的才對？",
    question: "同學們在討論，以下這些話對不對？",
    items: [
      { statement: "小安：「喜歡一個人，對方說不要就該停止」", answer: true, explain: "尊重別人的意願，「不要」就是「不要」！" },
      { statement: "小豪：「被欺負是因為你太弱了」", answer: false, explain: "被欺負不是受害者的錯！" },
      { statement: "小明：「開玩笑而已，幹嘛生氣」", answer: false, explain: "讓人不舒服就不是玩笑，要尊重別人的感受！" },
      { statement: "小美：「男生女生都可以當班長」", answer: true, explain: "領導能力和性別無關，每個人都有機會！" }
    ],
    correctMsg: "🎉 太厲害了！尊重意願、不怪受害者、不用玩笑當藉口——你都答對了！",
    wrongMsg: "記住：尊重說不、不怪受害者、讓人不舒服就不是玩笑、男女都可以當班長！"
  }
];

var currentLevel = 0, score = 0, answered = false, lives = 3, combo = 0, maxCombo = 0;
var timerInterval = null, timeLeft = 20;
var TIMER_MAX = 20;
var oxState = {};

var audioCtx = null;
function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playSound(type) {
  try {
    var ctx = getAudioCtx(), now = ctx.currentTime;
    var osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') { osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(1047, now + 0.15); gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15); }
    else if (type === 'wrong') { osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(250, now + 0.25); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25); osc.start(now); osc.stop(now + 0.25); }
    else if (type === 'tick') { osc.frequency.setValueAtTime(880, now); gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05); osc.start(now); osc.stop(now + 0.05); }
  } catch(e) {}
}

function createConfetti() {
  var em = ['🎉','✨','⭐','🌟','💫','🌈','💖'];
  for (var i = 0; i < 14; i++) {
    var p = document.createElement('div');
    p.className = 'confetti-particle';
    p.textContent = em[Math.floor(Math.random() * em.length)];
    p.style.left = (10 + Math.random() * 80) + '%';
    p.style.top = (30 + Math.random() * 40) + '%';
    document.body.appendChild(p);
    setTimeout(function(el) { el.remove(); }, 800, p);
  }
}
function createFloatingScore(x, y, pts, ok) {
  var f = document.createElement('div');
  f.className = 'floating-score ' + (ok ? 'correct' : 'wrong');
  f.textContent = ok ? '+' + pts + ' 🔥' : '-1 ❤️';
  f.style.left = x + 'px'; f.style.top = y + 'px';
  document.body.appendChild(f);
  setTimeout(function() { f.remove(); }, 1000);
}

function updateLives() {
  var el = document.getElementById('livesDisplay'), html = '';
  for (var i = 0; i < 3; i++) html += '<span class="heart' + (i >= lives ? ' lost' : '') + '">❤️</span>';
  el.innerHTML = html;
  if (lives <= 0) setTimeout(showGameover, 300);
}
function updateCombo() {
  var el = document.getElementById('comboDisplay');
  if (combo > 1) { el.classList.add('active'); document.getElementById('comboValue').textContent = combo; }
  else el.classList.remove('active');
  if (combo > maxCombo) maxCombo = combo;
}
function updateProgress() {
  document.getElementById('progressFill').style.width = ((currentLevel / levels.length) * 100) + '%';
  document.getElementById('progressText').innerHTML = '第 ' + (currentLevel + 1) + ' 關 / 共 ' + levels.length + ' 關';
  document.getElementById('scoreDisplay').textContent = score;
}

function startTimer() {
  timeLeft = TIMER_MAX;
  document.getElementById('timerContainer').style.display = 'block';
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 5 && timeLeft > 0) playSound('tick');
    if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) { answered = true; handleTimeout(); } }
  }, 1000);
}
function updateTimerDisplay() {
  var c = document.getElementById('timerCircle');
  c.style.setProperty('--percentage', (timeLeft / TIMER_MAX * 100) + '%');
  c.textContent = timeLeft;
  if (timeLeft <= 5) c.classList.add('warning'); else c.classList.remove('warning');
}
function handleTimeout() {
  var card = document.getElementById('gameCard');
  card.classList.add('shake-anim');
  lives--; combo = 0; updateLives(); updateCombo(); playSound('wrong');
  disableAll();
  showFeedbackEl('⏰ 時間到了！下次要更快哦！', false);
  setTimeout(function() { card.classList.remove('shake-anim'); showNextBtn(); }, 500);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}
function startGame() {
  currentLevel = 0; score = 0; answered = false; lives = 3; combo = 0; maxCombo = 0; oxState = {};
  updateLives(); updateCombo(); showScreen('gameScreen'); renderLevel();
}

function renderLevel() {
  answered = false; oxState = {}; updateProgress();
  if (timerInterval) clearInterval(timerInterval);
  var lv = levels[currentLevel], card = document.getElementById('gameCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'fadeIn .5s ease';

  if (lv.type === 'choice') {
    card.innerHTML = '<span class="level-badge">' + lv.badge + '</span>' +
      '<div class="scenario-emoji">' + lv.emoji + '</div>' +
      (lv.scenario ? '<div class="scenario-box">' + lv.scenario + '</div>' : '') +
      '<div class="question-text">' + lv.question + '</div>' +
      '<div class="options">' + lv.options.map(function(o, i) {
        return '<button class="option-btn" onclick="selectOption(' + i + ')">' + o.text + '</button>';
      }).join('') + '</div><div id="feedback"></div><div id="nextArea"></div>';
    startTimer();
  } else if (lv.type === 'ox') {
    oxState = { currentItem: 0, correctCount: 0, totalItems: lv.items.length };
    TIMER_MAX = 15 * lv.items.length;
    renderOxItem(lv, card);
    startTimer();
  }
}

function renderOxItem(lv, card) {
  var idx = oxState.currentItem;
  var item = lv.items[idx];

  var dotsHTML = '<div class="ox-progress-dots">';
  for (var i = 0; i < lv.items.length; i++) {
    var cls = 'ox-dot';
    if (i < idx) cls += oxState['result_' + i] ? ' done-correct' : ' done-wrong';
    else if (i === idx) cls += ' current';
    dotsHTML += '<div class="' + cls + '"></div>';
  }
  dotsHTML += '</div>';

  card.innerHTML = '<span class="level-badge">' + lv.badge + '</span>' +
    '<div class="question-text">' + lv.question + '</div>' +
    dotsHTML +
    '<div class="ox-sub-question">第 ' + (idx + 1) + ' / ' + lv.items.length + ' 題</div>' +
    '<div class="ox-statement">' + item.statement + '</div>' +
    '<div class="ox-buttons">' +
      '<button class="ox-btn o-btn" id="oxO" onclick="selectOX(true)">⭕</button>' +
      '<button class="ox-btn x-btn" id="oxX" onclick="selectOX(false)">❌</button>' +
    '</div>' +
    '<div id="oxExplain"></div>' +
    '<div id="feedback"></div><div id="nextArea"></div>';
}

function selectOX(userAnswer) {
  var lv = levels[currentLevel];
  var idx = oxState.currentItem;
  var item = lv.items[idx];
  var isCorrect = (userAnswer === item.answer);

  var oBtn = document.getElementById('oxO');
  var xBtn = document.getElementById('oxX');
  oBtn.classList.add('disabled');
  xBtn.classList.add('disabled');

  if (item.answer === true) {
    oBtn.classList.add('correct-answer');
    if (!isCorrect) xBtn.classList.add('wrong-answer');
  } else {
    xBtn.classList.add('correct-answer');
    if (!isCorrect) oBtn.classList.add('wrong-answer');
  }

  oxState['result_' + idx] = isCorrect;

  var explainEl = document.getElementById('oxExplain');
  explainEl.innerHTML = '<div class="feedback ' + (isCorrect ? 'correct' : 'wrong') + '" style="margin-top:12px">' +
    (isCorrect ? '✅ 答對了！' : '💡 答錯了！') + ' ' + item.explain + '</div>';

  if (isCorrect) {
    playSound('correct');
    oxState.correctCount++;
  } else {
    playSound('wrong');
  }

  // Move to next item after delay
  setTimeout(function() {
    oxState.currentItem++;
    if (oxState.currentItem >= lv.items.length) {
      // All items done
      var allCorrect = oxState.correctCount === lv.items.length;
      answered = true;
      if (timerInterval) clearInterval(timerInterval);

      if (allCorrect) {
        combo++;
        var timeBonus = Math.max(0, Math.floor(timeLeft / 2));
        var pts = 15 + timeBonus + (combo > 1 ? combo * 3 : 0);
        score += pts;
        createFloatingScore(window.innerWidth / 2, window.innerHeight / 2, pts, true);
        createConfetti();
      } else if (oxState.correctCount >= lv.items.length / 2) {
        combo++;
        var pts2 = 5 + oxState.correctCount * 2;
        score += pts2;
        createFloatingScore(window.innerWidth / 2, window.innerHeight / 2, pts2, true);
      } else {
        lives--; combo = 0; updateLives();
        var card2 = document.getElementById('gameCard');
        card2.classList.add('shake-anim');
        setTimeout(function() { card2.classList.remove('shake-anim'); }, 500);
      }

      updateCombo();
      document.getElementById('scoreDisplay').textContent = score;

      var resultMsg = '你答對了 ' + oxState.correctCount + ' / ' + lv.items.length + ' 題！';
      var feedbackMsg = allCorrect ? lv.correctMsg : lv.wrongMsg;

      var card3 = document.getElementById('gameCard');
      card3.innerHTML = '<span class="level-badge">' + lv.badge + '</span>' +
        '<div class="question-text" style="text-align:center">' + resultMsg + '</div>' +
        '<div id="feedback"><div class="feedback ' + (allCorrect ? 'correct' : 'wrong') + '">' +
        (allCorrect ? '✅ ' : '💡 ') + feedbackMsg + '</div></div>' +
        '<div id="nextArea"></div>';
      showNextBtn();
    } else {
      renderOxItem(lv, document.getElementById('gameCard'));
    }
  }, 1200);
}

function selectOption(idx) {
  if (answered) return; answered = true;
  if (timerInterval) clearInterval(timerInterval);
  var lv = levels[currentLevel], timeBonus = Math.max(0, Math.floor(timeLeft / 2));
  var ok = lv.options[idx].correct, card = document.getElementById('gameCard');

  document.querySelectorAll('.option-btn').forEach(function(b, i) {
    b.classList.add('disabled');
    if (lv.options[i].correct) b.classList.add('correct');
    if (i === idx && !ok) b.classList.add('wrong');
  });

  if (ok) {
    playSound('correct'); combo++;
    var pts = 10 + timeBonus + (combo > 1 ? combo * 2 : 0);
    score += pts;
    createFloatingScore(window.innerWidth / 2, window.innerHeight / 2, pts, true);
    createConfetti(); updateCombo();
  } else {
    playSound('wrong'); card.classList.add('shake-anim');
    lives--; combo = 0; updateLives(); updateCombo();
    setTimeout(function() { card.classList.remove('shake-anim'); }, 500);
  }
  document.getElementById('scoreDisplay').textContent = score;
  showFeedbackEl(ok ? lv.correctMsg : lv.wrongMsg, ok); showNextBtn();
}

function disableAll() {
  document.querySelectorAll('.option-btn, .ox-btn').forEach(function(el) {
    el.classList.add('disabled'); el.style.pointerEvents = 'none';
  });
}
function showFeedbackEl(msg, ok) {
  document.getElementById('feedback').innerHTML = '<div class="feedback ' + (ok ? 'correct' : 'wrong') + '"><span>' + (ok ? '✅' : '💡') + '</span> ' + msg + '</div>';
}
function showNextBtn() {
  var label = currentLevel < levels.length - 1 ? '下一關 ➜' : '看結果 🎉';
  document.getElementById('nextArea').innerHTML = '<div style="text-align:center"><button class="btn btn-next" onclick="nextLevel()">' + label + '</button></div>';
}
function nextLevel() {
  currentLevel++;
  TIMER_MAX = 20;
  if (currentLevel >= levels.length) showResult();
  else { renderLevel(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

function showGameover() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('gameoverScore').textContent = score; showScreen('gameoverScreen');
}

function showResult() {
  if (timerInterval) clearInterval(timerInterval);
  showScreen('resultScreen');
  var maxScore = 80, pct = score / maxScore;
  var emoji, title, msg, stars;
  if (pct >= 0.85) { emoji = '🏆'; title = '超級厲害！'; stars = '⭐⭐⭐'; msg = '你是性別平等小達人！\n你知道每個人都值得被尊重！'; }
  else if (pct >= 0.5) { emoji = '😊'; title = '做得很好！'; stars = '⭐⭐'; msg = '你已經學到很多了！\n繼續保持尊重和善良！'; }
  else { emoji = '💪'; title = '繼續加油！'; stars = '⭐'; msg = '沒關係，每次嘗試都會更進步！\n再玩一次試試看吧！'; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').innerHTML = title;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultScore').innerHTML = '最終分數：' + score + ' 分';
  document.getElementById('resultStats').innerHTML =
    '<div class="result-stat"><div class="result-stat-label">最高連擊</div><div class="result-stat-value">🔥x' + maxCombo + '</div></div>' +
    '<div class="result-stat"><div class="result-stat-label">剩餘生命</div><div class="result-stat-value">' + (lives > 0 ? '❤️'.repeat(lives) : '💔') + '</div></div>' +
    '<div class="result-stat"><div class="result-stat-label">總關卡</div><div class="result-stat-value">' + levels.length + '/' + levels.length + '</div></div>' +
    '<div class="result-stat"><div class="result-stat-label">總分</div><div class="result-stat-value">⭐ ' + score + '</div></div>';
  document.getElementById('resultMsg').innerHTML = msg;
}
</script>
</body>
</html>
